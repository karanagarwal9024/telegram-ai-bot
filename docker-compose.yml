services:
  redis:
    image: redis
    container_name: ai_bot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  worker:
    build: .
    container_name: ai_bot_worker
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./src:/app/src
    restart: unless-stopped

volumes:
  redis_data:
